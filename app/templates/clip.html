    <canvas></canvas>

    <div class="word-container">
        <p class="word">
            {{ word.get_html()|safe }}
        </p>
    </div>

    <div class="answers">
        {% for answer in word.get_answers() %}
            <button class="answer">
                {{ answer }}
            </button>
        {% endfor %}
    </div>
