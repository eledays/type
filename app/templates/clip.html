<canvas></canvas>

<div class="word-container">
    <p class="word">
        {{ word_parts[0] }}
        <span class="missing-letter"> </span>
        {{ word_parts[1] }}
    </p>
</div>

<div class="answers">
    {% for answer in answers %}
    <button class="answer">
        {{ answer }}
    </button>
    {% endfor %}
</div>
